name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build -- --configuration production

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (headless)
        run: npx ng test --watch=false --browsers=ChromeHeadless

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  docker:
    name: Docker Build & Verify
    runs-on: ubuntu-latest
    needs: [lint-and-build, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t simulador-examen-csa:ci .

      - name: Verify container starts and responds
        run: |
          docker run -d --name test-container -p 8080:80 simulador-examen-csa:ci
          echo "Waiting for container to start..."
          sleep 5
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080/)
          echo "HTTP status: $STATUS"
          docker stop test-container
          docker rm test-container
          if [ "$STATUS" -ne 200 ]; then
            echo "Container health check failed with status $STATUS"
            exit 1
          fi
          echo "Container responded successfully on port 80"
