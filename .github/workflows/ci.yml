name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (Prettier)
        run: npx prettier --check "src/**/*.ts"

      - name: Build (production)
        run: npm run build -- --configuration production

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test with coverage
        run: npx ng test --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Check coverage thresholds
        run: |
          node -e "
            const coverage = require('./coverage/simulador-examen-csa/coverage-summary.json');
            const total = coverage.total;
            const minStatements = 70;
            const minBranches = 60;
            if (total.statements.pct < minStatements) { console.error('Statements coverage ' + total.statements.pct + '% < ' + minStatements + '%'); process.exit(1); }
            if (total.branches.pct < minBranches) { console.error('Branch coverage ' + total.branches.pct + '% < ' + minBranches + '%'); process.exit(1); }
            console.log('Coverage OK: statements=' + total.statements.pct + '%, branches=' + total.branches.pct + '%');
          "

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  docker:
    name: Docker Build & Verify
    runs-on: ubuntu-latest
    needs: [lint-and-build, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t simulador-examen-csa:ci .

      - name: Verify container starts and responds
        run: |
          docker run -d --name test-container -p 8080:80 simulador-examen-csa:ci
          echo "Waiting for container to start..."
          sleep 5
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080/)
          echo "HTTP status: $STATUS"
          docker stop test-container
          docker rm test-container
          if [ "$STATUS" -ne 200 ]; then
            echo "Container health check failed with status $STATUS"
            exit 1
          fi
          echo "Container responded successfully on port 80"

  docker-push:
    name: Docker Push Artifact
    needs: [lint-and-build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and tag
        run: |
          docker build -t simulador-examen-csa:${{ github.sha }} .
          docker tag simulador-examen-csa:${{ github.sha }} simulador-examen-csa:latest

      - name: Save image artifact
        run: docker save simulador-examen-csa:latest | gzip > image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 7
